[keybindings]
# Navigation (magit-style: n/p instead of vim j/k)
"n" = "move down 1"
"p" = "move up 1"
"Ctrl+n" = "move down 1"
"Ctrl+p" = "move up 1"
"Ctrl+d" = "move down 5"
"Ctrl+u" = "move up 5"
"g" = "move top"
"G" = "move bottom"

# Panels
"Alt+1" = "focus queue"
"Alt+2" = "focus search"
"Alt+3" = "focus library"

# Back/Quit (magit: q = bury buffer)
"q" = "back"
"b" = "back"
"Q" = "quit"

# Playback
"Return" = "play"
"Space" = "playpause"
"." = "queue"
">" = "next"
"<" = "previous"

# Seek (f/F forward, b for back since q handles quit)
"F" = "seek +10000"
"B" = "seek -10000"

# Save/Delete (magit-inspired: s = stage/save, d = delete)
"s" = "save"
"S" = "save current"
"d" = "delete"

# Volume
"-" = "voldown 1"
"+" = "volup 1"
"[" = "voldown 5"
"]" = "volup 5"

# Repeat/Shuffle
"r" = "repeat"
"z" = "shuffle"

# Queue
"c" = "clear"
#"C-s" = "save queue"

# Open/Browse
"o" = "open selected"
"O" = "open current"
"m" = "open recommendations selected"
"M" = "open recommendations current"

# Share
"x" = "share selected"
"X" = "share current"

# Search/Command (keep these from defaults)
"/" = "search"
"?" = "help"

# Disable vim-style search occurrence navigation (freed n for movement)
"Escape" = "back"
